<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
      text { font-family: 'Noto Sans SC', 'Helvetica Neue', sans-serif; }
    </style>
  </defs>
  <rect width="800" height="600" fill="#324434"/>
  <text x="40" y="50" fill="#ffa61e" font-size="26" font-weight="700">三维企业分类框架</text>
  <text x="40" y="72" fill="#afbead" font-size="12">3-Dimensional Enterprise Classification Framework</text>
  <line x1="40" y1="85" x2="760" y2="85" stroke="#ffa61e" stroke-width="1"/>

  <!-- Dimension labels -->
  <text x="40" y="118" fill="#ffa61e" font-size="14" font-weight="700">维度一 · 行业属性</text>
  <text x="230" y="118" fill="#ffa61e" font-size="14" font-weight="700">维度二 · 成长阶段</text>
  <text x="500" y="118" fill="#ffa61e" font-size="14" font-weight="700">维度三 · 规范程度</text>

  <!-- Dimension 1: Industry categories - vertical list with icons -->
  <rect x="40" y="135" width="170" height="40" fill="none" stroke="#ffa61e" stroke-width="1.5" rx="4"/>
  <text x="55" y="160" fill="#afbead" font-size="13">💻 数字经济</text>
  <rect x="40" y="182" width="170" height="40" fill="none" stroke="#ffa61e" stroke-width="1.5" rx="4"/>
  <text x="55" y="207" fill="#afbead" font-size="13">⚙️ 智能制造</text>
  <rect x="40" y="229" width="170" height="40" fill="none" stroke="#ffa61e" stroke-width="1.5" rx="4"/>
  <text x="55" y="254" fill="#afbead" font-size="13">🧪 新材料</text>
  <rect x="40" y="276" width="170" height="40" fill="none" stroke="#ffa61e" stroke-width="1.5" rx="4"/>
  <text x="55" y="301" fill="#afbead" font-size="13">🧬 生物医药</text>

  <!-- Dimension 2: Growth stages - horizontal pipeline -->
  <rect x="230" y="135" width="120" height="60" fill="#3d5040" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="245" y="160" fill="#afbead" font-size="13">🌱 初创</text>
  <text x="245" y="178" fill="#afbead" font-size="9">种子轮/天使轮</text>
  <line x1="350" y1="165" x2="370" y2="165" stroke="#afbead" stroke-width="1"/>
  <polygon points="368,161 374,165 368,169" fill="#afbead"/>

  <rect x="374" y="135" width="120" height="60" fill="#485d4b" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="389" y="160" fill="#afbead" font-size="13">📈 成长</text>
  <text x="389" y="178" fill="#afbead" font-size="9">A/B 轮</text>
  <line x1="494" y1="165" x2="514" y2="165" stroke="#afbead" stroke-width="1"/>
  <polygon points="512,161 518,165 512,169" fill="#afbead"/>

  <rect x="518" y="135" width="120" height="60" fill="#556b58" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="533" y="160" fill="#afbead" font-size="13">🏭 成熟</text>
  <text x="533" y="178" fill="#afbead" font-size="9">规上企业</text>

  <line x1="638" y1="165" x2="643" y2="165" stroke="#afbead" stroke-width="1"/>

  <rect x="374" y="210" width="120" height="60" fill="#627a65" stroke="#ffa61e" stroke-width="1.5" rx="4"/>
  <text x="389" y="235" fill="#ffa61e" font-size="13">🏛️ 拟上市</text>
  <text x="389" y="253" fill="#afbead" font-size="9">Pre-IPO</text>
  <line x1="350" y1="240" x2="370" y2="240" stroke="#ffa61e" stroke-width="1"/>
  <polygon points="368,236 374,240 368,244" fill="#ffa61e"/>
  <line x1="494" y1="240" x2="514" y2="240" stroke="#afbead" stroke-width="1"/>

  <!-- Dimension 3: Compliance levels - spectrum bar -->
  <rect x="500" y="135" width="260" height="30" fill="#3d5040" stroke="#afbead" stroke-width="1" rx="15"/>
  <rect x="565" y="135" width="65" height="30" fill="#485d4b" rx="15"/>
  <rect x="630" y="135" width="65" height="30" fill="#556b58" rx="15"/>
  <rect x="695" y="135" width="65" height="30" fill="#627a65" stroke="#ffa61e" stroke-width="1.5" rx="15"/>
  <text x="510" y="153" fill="#afbead" font-size="10">未规范</text>
  <text x="575" y="153" fill="#afbead" font-size="10">培育中</text>
  <text x="640" y="153" fill="#afbead" font-size="10">已规范</text>
  <text x="705" y="153" fill="#ffa61e" font-size="10">标杆</text>

  <!-- Matrix visualization: industry x stage -->
  <text x="230" y="310" fill="#ffa61e" font-size="14" font-weight="700">交叉分析示例</text>
  <text x="230" y="326" fill="#afbead" font-size="10">行业属性 × 成长阶段 矩阵</text>

  <!-- Matrix -->
  <rect x="320" y="295" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="330" y="313" fill="#afbead" font-size="10">初创</text>
  <rect x="395" y="295" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="405" y="313" fill="#afbead" font-size="10">成长</text>
  <rect x="470" y="295" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="480" y="313" fill="#afbead" font-size="10">成熟</text>
  <rect x="545" y="295" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="555" y="313" fill="#afbead" font-size="10">拟上市</text>

  <rect x="245" y="321" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="250" y="339" fill="#afbead" font-size="10">数字经济</text>
  <rect x="320" y="321" width="75" height="26" fill="#3d5040" stroke="#afbead" stroke-width="1"/>
  <rect x="395" y="321" width="75" height="26" fill="#3d5040" stroke="#afbead" stroke-width="1"/>
  <rect x="470" y="321" width="75" height="26" fill="#485d4b" stroke="#afbead" stroke-width="1"/>
  <rect x="545" y="321" width="75" height="26" fill="#485d4b" stroke="#afbead" stroke-width="1"/>

  <rect x="245" y="347" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="250" y="365" fill="#afbead" font-size="10">智能制造</text>
  <rect x="320" y="347" width="75" height="26" fill="#3d5040" stroke="#afbead" stroke-width="1"/>
  <rect x="395" y="347" width="75" height="26" fill="#485d4b" stroke="#afbead" stroke-width="1"/>
  <rect x="470" y="347" width="75" height="26" fill="#556b58" stroke="#afbead" stroke-width="1"/>
  <rect x="545" y="347" width="75" height="26" fill="#556b58" stroke="#afbead" stroke-width="1"/>

  <rect x="245" y="373" width="75" height="26" fill="none" stroke="#afbead" stroke-width="1"/>
  <text x="250" y="391" fill="#afbead" font-size="10">新材料</text>
  <rect x="320" y="373" width="75" height="26" fill="#3d5040" stroke="#afbead" stroke-width="1"/>
  <rect x="395" y="373" width="75" height="26" fill="#485d4b" stroke="#afbead" stroke-width="1"/>
  <rect x="470" y="373" width="75" height="26" fill="#556b58" stroke="#afbead" stroke-width="1"/>
  <rect x="545" y="373" width="75" height="26" fill="#627a65" stroke="#afbead" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="40" y="560" fill="#afbead" font-size="11">应用场景：企业分层分类、精准招商方向识别、政策配套制定</text>
  <text x="40" y="578" fill="#afbead" font-size="10">Use case: Enterprise tiering, targeted investment direction, policy alignment</text>

  <line x1="770" y1="20" x2="780" y2="20" stroke="#ffa61e" stroke-width="2"/>
  <line x1="780" y1="20" x2="780" y2="30" stroke="#ffa61e" stroke-width="2"/>
</svg>
echo "classification-framework.svg done"
