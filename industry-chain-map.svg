<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
      text { font-family: 'Noto Sans SC', 'Helvetica Neue', sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffa61e"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#324434"/>
  <text x="40" y="50" fill="#ffa61e" font-size="26" font-weight="700">产业链图谱</text>
  <text x="40" y="72" fill="#afbead" font-size="12">Industry Chain Mapping · 汽配及装备制造产业</text>
  <line x1="40" y1="85" x2="760" y2="85" stroke="#ffa61e" stroke-width="1"/>

  <!-- Upstream section -->
  <text x="40" y="115" fill="#afbead" font-size="11" font-weight="700">上游 · 原料与基础加工</text>
  <line x1="40" y1="120" x2="200" y2="120" stroke="#afbead" stroke-width="0.5"/>

  <rect x="40" y="135" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="55" y="158" fill="#afbead" font-size="13">钢铁/有色金属</text>
  <text x="55" y="174" fill="#afbead" font-size="10">原材料供应商</text>

  <rect x="230" y="135" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="245" y="158" fill="#afbead" font-size="13">铸造毛坯</text>
  <text x="245" y="174" fill="#afbead" font-size="10">铸造工艺加工</text>

  <!-- Arrow between upstream nodes -->
  <line x1="200" y1="160" x2="225" y2="160" stroke="#ffa61e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Midstream section -->
  <text x="40" y="225" fill="#afbead" font-size="11" font-weight="700">中游 · 精密制造与加工</text>
  <line x1="40" y1="230" x2="200" y2="230" stroke="#afbead" stroke-width="0.5"/>

  <rect x="40" y="245" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="55" y="268" fill="#afbead" font-size="13">精密加工</text>
  <text x="55" y="284" fill="#afbead" font-size="10">CNC/热处理/表面处理</text>

  <rect x="230" y="245" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="245" y="268" fill="#afbead" font-size="13">轴承制造</text>
  <text x="245" y="284" fill="#afbead" font-size="10">核心基础零部件</text>

  <rect x="420" y="245" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="435" y="268" fill="#afbead" font-size="13">汽配零部件</text>
  <text x="435" y="284" fill="#afbead" font-size="10">发动机/底盘/电子配件</text>

  <!-- Arrows between midstream nodes -->
  <line x1="200" y1="270" x2="225" y2="270" stroke="#ffa61e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="270" x2="415" y2="270" stroke="#ffa61e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Downstream section -->
  <text x="40" y="345" fill="#afbead" font-size="11" font-weight="700">下游 · 装备制造与终端</text>
  <line x1="40" y1="350" x2="200" y2="350" stroke="#afbead" stroke-width="0.5"/>

  <rect x="40" y="365" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="55" y="388" fill="#afbead" font-size="13">高端装备制造</text>
  <text x="55" y="404" fill="#afbead" font-size="10">新能源/智能装备</text>

  <rect x="230" y="365" width="160" height="50" fill="none" stroke="#ffa61e" stroke-width="2" rx="6"/>
  <text x="245" y="388" fill="#afbead" font-size="13">整车/整机装配</text>
  <text x="245" y="404" fill="#afbead" font-size="10">新能源汽车/工程机械</text>

  <rect x="420" y="365" width="160" height="50" fill="#ffa61e" rx="6"/>
  <text x="435" y="388" fill="#324434" font-size="13" font-weight="700">终端市场</text>
  <text x="435" y="404" fill="#324434" font-size="10">国内/海外客户</text>

  <!-- Arrows between downstream nodes -->
  <line x1="200" y1="390" x2="225" y2="390" stroke="#ffa61e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="390" x2="415" y2="390" stroke="#ffa61e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical arrows connecting upstream → midstream → downstream -->
  <line x1="120" y1="185" x2="120" y2="240" stroke="#ffa61e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="310" y1="185" x2="310" y2="240" stroke="#ffa61e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="120" y1="295" x2="120" y2="360" stroke="#ffa61e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="310" y1="295" x2="310" y2="360" stroke="#ffa61e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Side labels -->
  <text x="30" y="210" fill="#afbead" font-size="10" transform="rotate(-90,30,210)">上游</text>
  <text x="30" y="320" fill="#afbead" font-size="10" transform="rotate(-90,30,320)">中游</text>
  <text x="30" y="440" fill="#afbead" font-size="10" transform="rotate(-90,30,440)">下游</text>

  <!-- Right side: Supporting ecosystem -->
  <line x1="620" y1="105" x2="620" y2="500" stroke="rgba(175,190,173,0.2)" stroke-width="1"/>

  <text x="640" y="115" fill="#ffa61e" font-size="14" font-weight="700">配套支撑</text>
  <text x="640" y="132" fill="#afbead" font-size="10">Supporting Ecosystem</text>

  <rect x="640" y="150" width="130" height="40" fill="none" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="650" y="170" fill="#afbead" font-size="11">设备供应商</text>
  <text x="650" y="182" fill="#afbead" font-size="9">数控机床/产线</text>

  <rect x="640" y="200" width="130" height="40" fill="none" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="650" y="220" fill="#afbead" font-size="11">检测认证</text>
  <text x="650" y="232" fill="#afbead" font-size="9">质量/标准认证</text>

  <rect x="640" y="250" width="130" height="40" fill="none" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="650" y="270" fill="#afbead" font-size="11">物流仓储</text>
  <text x="650" y="282" fill="#afbead" font-size="9">供应链管理</text>

  <rect x="640" y="300" width="130" height="40" fill="none" stroke="#afbead" stroke-width="1" rx="4"/>
  <text x="650" y="320" fill="#afbead" font-size="11">金融服务</text>
  <text x="650" y="332" fill="#afbead" font-size="9">供应链融资/保理</text>

  <!-- Dotted lines from ecosystem to chain -->
  <line x1="580" y1="270" x2="635" y2="320" stroke="#afbead" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="580" y1="270" x2="635" y2="270" stroke="#afbead" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Bottom methodology -->
  <text x="40" y="560" fill="#afbead" font-size="11">方法：基于产业链上下游调研与节点分析，识别补链方向和招商引资重点</text>
  <text x="40" y="578" fill="#afbead" font-size="10">Method: Upstream/midstream/downstream analysis to identify chain gaps and investment targets</text>

  <line x1="770" y1="20" x2="780" y2="20" stroke="#ffa61e" stroke-width="2"/>
  <line x1="780" y1="20" x2="780" y2="30" stroke="#ffa61e" stroke-width="2"/>
</svg>
echo "industry-chain-map.svg done"
